<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍽️ 献立アプリ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #ff6b6b;
    --primary-light: #ff8e8e;
    --secondary: #ffd93d;
    --accent: #6bcb77;
    --blue: #4d96ff;
    --purple: #c77dff;
    --bg: #f8f9fa;
    --card: #ffffff;
    --text: #2d3436;
    --text-light: #636e72;
    --border: #e0e0e0;
    --shadow: 0 2px 12px rgba(0,0,0,0.1);
    --radius: 16px;
    --bottom-nav: 70px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: var(--bottom-nav);
  }

  /* ヘッダー */
  .app-header {
    background: linear-gradient(135deg, var(--primary), #ff4757);
    color: white;
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(255,107,107,0.3);
  }
  .app-header h1 { font-size: 1.3rem; font-weight: 700; }
  .app-header .subtitle { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }

  /* タブコンテンツ */
  .tab-content { display: none; padding: 16px; }
  .tab-content.active { display: block; }

  /* カード */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* 献立タブ */
  .week-date {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--bg);
  }
  .week-nav-btn {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 600;
  }
  .week-label {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text);
  }

  .day-card {
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .day-header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
  }
  .day-header.today { background: linear-gradient(135deg, #fff5f5, #ffe8e8); }
  .day-header.night-shift { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; }
  .day-badge {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.75rem;
    margin-right: 10px;
    flex-shrink: 0;
  }
  .day-badge.sun { background: #ffe5e5; color: #e74c3c; }
  .day-badge.mon { background: #e5eeff; color: #3498db; }
  .day-badge.tue { background: #e5eeff; color: #3498db; }
  .day-badge.wed { background: #e5eeff; color: #3498db; }
  .day-badge.thu { background: #e5eeff; color: #3498db; }
  .day-badge.fri { background: #e5eeff; color: #3498db; }
  .day-badge.sat { background: #e5f0ff; color: #2980b9; }
  .day-badge.today-mark { background: var(--primary); color: white; }
  .day-info { flex: 1; }
  .day-main { font-weight: 700; font-size: 0.95rem; }
  .day-sub { font-size: 0.72rem; color: var(--text-light); margin-top: 1px; }
  .night-shift-badge {
    background: var(--secondary);
    color: #333;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    margin-left: auto;
  }
  .night-shift .day-sub { color: rgba(255,255,255,0.7); }

  .day-menu {
    padding: 0 14px 12px;
    border-top: 1px solid var(--bg);
    background: #fafafa;
  }
  .menu-row {
    display: flex;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .menu-row:last-child { border-bottom: none; }
  .menu-category {
    font-size: 0.72rem;
    font-weight: 700;
    color: white;
    padding: 3px 8px;
    border-radius: 20px;
    width: 58px;
    text-align: center;
    flex-shrink: 0;
    margin-right: 8px;
  }
  .cat-main { background: var(--primary); }
  .cat-sub { background: var(--accent); }
  .cat-soup { background: var(--blue); }
  .cat-kids { background: var(--purple); }
  .menu-name { flex: 1; font-size: 0.88rem; font-weight: 500; }
  .menu-change-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 0.7rem;
    cursor: pointer;
    color: var(--text-light);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .menu-change-btn:hover { border-color: var(--primary); color: var(--primary); }
  .cookpad-btn {
    background: none;
    border: 1.5px solid #f84c00;
    border-radius: 8px;
    padding: 3px 8px;
    font-size: 0.7rem;
    cursor: pointer;
    color: #f84c00;
    flex-shrink: 0;
    margin-left: 4px;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .cookpad-btn:hover { background: #fff5f0; }

  /* 夜勤設定ボタン */
  .night-toggle {
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    margin-left: 6px;
    padding: 2px;
  }

  /* 再生成ボタン */
  .regen-btn {
    background: linear-gradient(135deg, var(--primary), #ff4757);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 13px;
    width: 100%;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 14px;
    box-shadow: 0 4px 12px rgba(255,107,107,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  /* 買い物リスト */
  .shopping-section { margin-bottom: 14px; }
  .shopping-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .shopping-item {
    display: flex;
    align-items: center;
    padding: 9px 12px;
    background: var(--bg);
    border-radius: 10px;
    margin-bottom: 5px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .shopping-item.checked {
    opacity: 0.5;
    text-decoration: line-through;
  }
  .shopping-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .shopping-item.checked .shopping-check {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .shopping-item-name { flex: 1; font-size: 0.88rem; }
  .shopping-amount { font-size: 0.78rem; color: var(--text-light); font-weight: 600; }

  /* レパートリータブ */
  .repertoire-section { margin-bottom: 14px; }
  .rep-category-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: space-between;
  }
  .rep-items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .rep-item {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .rep-delete {
    background: none;
    border: none;
    color: var(--text-light);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 0;
    line-height: 1;
  }
  .rep-delete:hover { color: var(--primary); }
  .add-rep-row {
    display: flex;
    gap: 8px;
    margin-top: 6px;
  }
  .add-rep-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.85rem;
    outline: none;
    background: var(--bg);
  }
  .add-rep-input:focus { border-color: var(--primary); }
  .add-rep-btn {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* ボトムナビ */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 200;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    height: var(--bottom-nav);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    padding: 8px 4px;
    border: none;
    background: none;
    color: var(--text-light);
    font-size: 0.65rem;
    font-weight: 600;
    transition: color 0.2s;
  }
  .nav-item.active { color: var(--primary); }
  .nav-item .nav-icon { font-size: 1.5rem; }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 30px;
    width: 100%;
    max-height: 70vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-close {
    background: var(--bg);
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .modal-option {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-option:hover, .modal-option.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  /* バッジカウント */
  .badge {
    background: var(--primary);
    color: white;
    border-radius: 20px;
    padding: 1px 6px;
    font-size: 0.7rem;
    font-weight: 700;
  }

  /* トースト通知 */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #2d3436;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    z-index: 400;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* 週ナビゲーション */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .week-nav-arrow {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    box-shadow: var(--shadow);
  }
  .week-nav-text { font-weight: 700; font-size: 0.9rem; color: var(--text); }

  /* レシピ検索 */
  .cookpad-section {
    background: linear-gradient(135deg, #fff5f0, #ffe8e0);
    border: 1.5px solid #f84c00;
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cookpad-logo { font-size: 1.5rem; }
  .cookpad-text { flex: 1; font-size: 0.85rem; color: #f84c00; font-weight: 600; }
  .cookpad-search-btn {
    background: #f84c00;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
  }

  .empty-state {
    text-align: center;
    padding: 30px;
    color: var(--text-light);
    font-size: 0.9rem;
  }

  /* スクロールバー非表示 */
  ::-webkit-scrollbar { width: 0; }

  /* アニメーション */
  @keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .day-card { animation: slideIn 0.3s ease; }

  .night-shift-header { background: linear-gradient(135deg, #2d1b69, #11998e) !important; color: white; }
  .night-shift-header .day-badge { background: rgba(255,255,255,0.2) !important; color: white !important; }
  .night-shift-header .day-sub { color: rgba(255,255,255,0.7) !important; }

  .today-indicator {
    display: inline-block;
    background: var(--primary);
    color: white;
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 700;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* クックパッドモーダル */
  .cookpad-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 500;
    display: none;
    flex-direction: column;
    align-items: stretch;
  }
  .cookpad-modal-overlay.open { display: flex; }
  .cookpad-modal-header {
    background: #f84c00;
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .cookpad-modal-title { flex: 1; font-weight: 700; font-size: 0.95rem; }
  .cookpad-modal-close {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cookpad-modal-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: white;
    overflow: hidden;
  }
  .cookpad-search-bar {
    display: flex;
    gap: 8px;
    padding: 12px;
    background: #fff5f0;
    border-bottom: 1px solid #ffd0b0;
  }
  .cookpad-search-input {
    flex: 1;
    border: 1.5px solid #f84c00;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.9rem;
    outline: none;
  }
  .cookpad-search-go {
    background: #f84c00;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .cookpad-links-area {
    padding: 16px;
    overflow-y: auto;
    flex: 1;
  }
  .cookpad-link-item {
    display: block;
    background: #fff5f0;
    border: 1.5px solid #f84c00;
    border-radius: 12px;
    padding: 13px 16px;
    margin-bottom: 10px;
    color: #f84c00;
    font-weight: 700;
    font-size: 0.9rem;
    text-decoration: none;
    text-align: center;
  }
  .cookpad-link-desc {
    font-size: 0.75rem;
    color: var(--text-light);
    font-weight: 400;
    margin-top: 3px;
  }
  .cookpad-open-browser {
    display: block;
    background: #f84c00;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    width: 100%;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    text-align: center;
    text-decoration: none;
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>🍽️ 献立アプリ</h1>
  <div class="subtitle">1週間の夕飯を自動生成</div>
</div>

<!-- 献立タブ -->
<div id="tab-menu" class="tab-content active">
  <div class="week-nav">
    <button class="week-nav-arrow" onclick="changeWeek(-1)">←</button>
    <div class="week-nav-text" id="week-label">今週の献立</div>
    <button class="week-nav-arrow" onclick="changeWeek(1)">→</button>
  </div>
  <button class="regen-btn" onclick="generateWeekMenu()">
    🎲 1週間の献立を自動生成
  </button>
  <div id="week-menu-container"></div>
</div>

<!-- 買い物リストタブ -->
<div id="tab-shopping" class="tab-content">
  <div class="card">
    <div class="card-title">🛒 今週の買い物リスト</div>
    <div id="shopping-list-container"></div>
  </div>
  <button class="regen-btn" onclick="clearChecked()" style="background: linear-gradient(135deg, #636e72, #2d3436); margin-top: 4px;">
    🗑️ チェック済みをクリア
  </button>
</div>

<!-- レパートリータブ -->
<div id="tab-repertoire" class="tab-content">
  <div id="repertoire-container"></div>
</div>

<!-- 設定タブ -->
<div id="tab-settings" class="tab-content">
  <div class="card">
    <div class="card-title">🌛 夜勤設定</div>
    <p style="font-size:0.85rem; color:var(--text-light); margin-bottom:12px;">献立画面で各日の「🌛」ボタンをタップすると夜勤日に設定できます。夜勤日は丼ものメニューが自動選択されます。</p>
    <div id="night-shift-list" style="font-size:0.85rem; color:var(--text-light);">夜勤日はまだ設定されていません</div>
  </div>
  <div class="card">
    <div class="card-title">🍳 クックパッド レシピ検索</div>
    <p style="font-size:0.85rem; color:var(--text-light); margin-bottom:12px;">各メニューの横にある「レシピ」ボタンでクックパッドのレシピを検索できます。</p>
    <div class="cookpad-section">
      <div class="cookpad-logo">🍴</div>
      <div class="cookpad-text">クックパッドで<br>レシピを検索する</div>
      <button class="cookpad-search-btn" onclick="openCookpad('')">検索する</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">ℹ️ アプリについて</div>
    <p style="font-size:0.85rem; color:var(--text-light); line-height:1.6;">献立アプリ v1.0<br>自分のレパートリーから1週間の夕飯を自動生成します。<br>レパートリーは自由に追加・削除できます。</p>
  </div>
</div>

<!-- ボトムナビ -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('menu', this)">
    <span class="nav-icon">📅</span>献立
  </button>
  <button class="nav-item" onclick="switchTab('shopping', this)">
    <span class="nav-icon">🛒</span>買い物
  </button>
  <button class="nav-item" onclick="switchTab('repertoire', this)">
    <span class="nav-icon">📝</span>レパートリー
  </button>
  <button class="nav-item" onclick="switchTab('settings', this)">
    <span class="nav-icon">⚙️</span>設定
  </button>
</nav>

<!-- メニュー変更モーダル -->
<div class="modal-overlay" id="change-modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      <span id="modal-title-text">メニューを選択</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-options" id="modal-options"></div>
  </div>
</div>

<!-- クックパッドモーダル -->
<div class="cookpad-modal-overlay" id="cookpad-modal">
  <div class="cookpad-modal-header">
    <span style="font-size:1.3rem">🍴</span>
    <span class="cookpad-modal-title" id="cookpad-modal-title">クックパッド レシピ</span>
    <button class="cookpad-modal-close" onclick="closeCookpadModal()">✕</button>
  </div>
  <div class="cookpad-modal-body">
    <div class="cookpad-search-bar">
      <input class="cookpad-search-input" id="cookpad-search-input" placeholder="料理名を入力..." type="text" onkeypress="if(event.key==='Enter')doCookpadSearch()">
      <button class="cookpad-search-go" onclick="doCookpadSearch()">検索</button>
    </div>

function loadFromStorage() {
  try {
    const r = localStorage.getItem(LS_KEYS.repertoire);
    if (r) repertoire = JSON.parse(r);
    const m = localStorage.getItem(LS_KEYS.weekMenus);
    if (m) state.weekMenus = JSON.parse(m);
    const n = localStorage.getItem(LS_KEYS.nightShift);
    if (n) state.nightShiftDays = new Set(JSON.parse(n));
    const s = localStorage.getItem(LS_KEYS.shoppingChecked);
    if (s) state.shoppingChecked = new Set(JSON.parse(s));
  } catch(e) {}
}

function saveToStorage() {
  try {
    localStorage.setItem(LS_KEYS.repertoire, JSON.stringify(repertoire));
    localStorage.setItem(LS_KEYS.weekMenus, JSON.stringify(state.weekMenus));
    localStorage.setItem(LS_KEYS.nightShift, JSON.stringify([...state.nightShiftDays]));
    localStorage.setItem(LS_KEYS.shoppingChecked, JSON.stringify([...state.shoppingChecked]));
  } catch(e) {}
}

// =============================================
// ユーティリティ
// =============================================
function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getWeekDates(offset = 0) {
  const today = new Date();
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - day + (day === 0 ? -6 : 1) + offset * 7);
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function toDateStr(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function isToday(date) {
  const t = new Date();
  return date.getFullYear() === t.getFullYear() &&
         date.getMonth() === t.getMonth() &&
         date.getDate() === t.getDate();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// メニュー生成
// =============================================
function getMainMenu(isNightShift) {
  if (isNightShift) {
    return {item: getRandom(repertoire.don), type: 'don'};
  }
  // 肉3:魚1:丼2:麺1の比率でランダム
  const weights = [
    ...repertoire.meat.map(i => ({item: i, type: 'meat'})),
    ...repertoire.meat.map(i => ({item: i, type: 'meat'})),
    ...repertoire.meat.map(i => ({item: i, type: 'meat'})),
    ...repertoire.fish.map(i => ({item: i, type: 'fish'})),
    ...repertoire.don.map(i => ({item: i, type: 'don'})),
    ...repertoire.don.map(i => ({item: i, type: 'don'})),
    ...repertoire.noodle.map(i => ({item: i, type: 'noodle'}))
  ];
  return getRandom(weights);
}

function generateDayMenu(dateStr, isNightShift) {
  const main = getMainMenu(isNightShift);
  return {
    main: main.item,
    mainType: main.type,
    side: getRandom(repertoire.side),
    soup: getRandom(repertoire.soup),
    kids: getRandom(repertoire.kids)
  };
}

function generateWeekMenu() {
  const dates = getWeekDates(state.weekOffset);
  dates.forEach(date => {
    const ds = toDateStr(date);
    // 夜勤設定済みの日はそのまま丼もの、それ以外は通常生成
    const isNight = state.nightShiftDays.has(ds);
    state.weekMenus[ds] = generateDayMenu(ds, isNight);
  });
  saveToStorage();
  renderWeekMenu();
  showToast('🎲 1週間の献立を生成しました！');
}

// =============================================
// 献立レンダリング
// =============================================
function renderWeekMenu() {
  const dates = getWeekDates(state.weekOffset);
  const container = document.getElementById('week-menu-container');

  // 週ラベル更新
  const first = dates[0];
  const last = dates[6];
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('week-label').textContent =
    state.weekOffset === 0 ? `今週 (${fmt(first)}〜${fmt(last)})` :
    state.weekOffset < 0 ? `先週 (${fmt(first)}〜${fmt(last)})` :
    `来週 (${fmt(first)}〜${fmt(last)})`;

  container.innerHTML = '';
  dates.forEach(date => {
    const ds = toDateStr(date);
    const menu = state.weekMenus[ds];
    const isNight = state.nightShiftDays.has(ds);
    const todayFlag = isToday(date);
    const dayIdx = date.getDay();

    const card = document.createElement('div');
    card.className = 'day-card';

    // ヘッダー
    const headerClass = isNight ? 'day-header night-shift-header' : (todayFlag ? 'day-header today' : 'day-header');
    const badgeClass = todayFlag ? 'day-badge today-mark' : `day-badge ${DAY_EN[dayIdx]}`;

    card.innerHTML = `
      <div class="${headerClass}" onclick="toggleDayMenu('${ds}')">
        <div class="${badgeClass}">
          <span style="font-size:1rem">${DAYS[dayIdx]}</span>
          <span style="font-size:0.65rem">${date.getDate()}</span>
        </div>
        <div class="day-info">
          <div class="day-main" style="${isNight ? 'color:white' : ''}">
            ${date.getMonth()+1}月${date.getDate()}日（${DAYS[dayIdx]}）
            ${todayFlag ? '<span class="today-indicator">今日</span>' : ''}
          </div>
          <div class="day-sub">${menu ? menu.main : '未設定'}</div>
        </div>
        ${isNight ? '<span class="night-shift-badge">🌛 夜勤</span>' : ''}
        <button class="night-toggle" onclick="event.stopPropagation(); toggleNightShift('${ds}')" title="夜勤設定">🌛</button>
      </div>
    `;

    if (menu) {
      const menuDiv = document.createElement('div');
      menuDiv.className = 'day-menu';
      menuDiv.id = `day-menu-${ds}`;

      const rows = [
        {cat: CATEGORIES[0], value: menu.main, key: 'main', mainType: menu.mainType},
        {cat: CATEGORIES[1], value: menu.side, key: 'side'},
        {cat: CATEGORIES[2], value: menu.soup, key: 'soup'},
        {cat: CATEGORIES[3], value: menu.kids, key: 'kids'}
      ];

      rows.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'menu-row';

        const catSpan = document.createElement('span');
        catSpan.className = `menu-category ${row.cat.cssClass}`;
        catSpan.textContent = row.cat.label;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'menu-name';
        nameSpan.textContent = row.value;

        const changeBtn = document.createElement('button');
        changeBtn.className = 'menu-change-btn';
        changeBtn.innerHTML = '✏️ 変更';
        changeBtn.onclick = () => openChangeModal(ds, row.key, row.cat.label);

        const cookpadLink = document.createElement('a');
        cookpadLink.className = 'cookpad-btn';
        cookpadLink.href = 'https://cookpad.com/jp/search/' + encodeURIComponent(row.value);
        cookpadLink.target = '_blank';
        cookpadLink.rel = 'noopener noreferrer';
        cookpadLink.style.textDecoration = 'none';
        cookpadLink.textContent = '🍴 レシピ';

        rowEl.appendChild(catSpan);
        rowEl.appendChild(nameSpan);
        rowEl.appendChild(changeBtn);
        rowEl.appendChild(cookpadLink);
        menuDiv.appendChild(rowEl);
      });

      card.appendChild(menuDiv);
    } else {
      const noMenu = document.createElement('div');
      noMenu.className = 'day-menu';
      noMenu.innerHTML = '<div style="padding:10px;font-size:0.85rem;color:var(--text-light);">献立を生成してください</div>';
      card.appendChild(noMenu);
    }

    container.appendChild(card);
  });

  // 夜勤リスト更新
