<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="こんだて">
<meta name="theme-color" content="#e8944a">
<title>こんだてアプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;overflow:hidden}
body{font-family:-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif}
.app-wrap{width:100%;max-width:430px;height:100svh;margin:0 auto;background:#f2f2f7;display:flex;flex-direction:column;position:relative;overflow:hidden}
.status-bar{background:#e8944a;padding:env(safe-area-inset-top,44px) 20px 0;min-height:calc(env(safe-area-inset-top,44px));flex-shrink:0}
.page-header{background:#e8944a;padding:12px 20px 18px;flex-shrink:0}
.page-header h1{color:#fff;font-size:22px;font-weight:700;margin-bottom:2px}
.page-header p{color:rgba(255,255,255,0.85);font-size:13px}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 70px)}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e0e0e0;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;padding:10px 0 8px}
.nav-item .nav-icon{font-size:24px;line-height:1}
.nav-item .nav-label{font-size:10px;color:#8e8e93;font-weight:500}
.nav-item.active .nav-label{color:#e8944a}
.page{display:none}.page.active{display:block}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:16px}
.cal-cell{background:#fff;border-radius:14px;padding:8px 2px;text-align:center;cursor:pointer;min-height:68px;display:flex;flex-direction:column;align-items:center;gap:2px;border:2px solid transparent;transition:transform 0.1s}
.cal-cell:active{transform:scale(0.93)}
.cal-cell.today{border-color:#e8944a}
.cal-cell.night{background:#e8f0ff}
.cal-cell .cday{font-size:10px;color:#8e8e93;font-weight:600}
.cal-cell .cnum{font-size:18px;font-weight:700;color:#1c1c1e}
.cal-cell .cicon{font-size:18px;min-height:20px;line-height:1}
.cal-cell.sun .cday,.cal-cell.sun .cnum{color:#e8944a}
.cal-cell.sat .cday,.cal-cell.sat .cnum{color:#185fa5}
.hint-box{margin:0 16px 16px;background:#fff;border-radius:14px;padding:14px 16px;font-size:13px;color:#8e8e93;line-height:1.7}
.big-btn{margin:0 16px 16px;background:#e8944a;color:#fff;border:none;border-radius:16px;padding:18px;font-size:16px;font-weight:700;width:calc(100% - 32px);cursor:pointer;letter-spacing:0.3px;transition:transform 0.1s,background 0.1s}
.big-btn:active{transform:scale(0.97);background:#c0703a}
.menu-scroll{padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.menu-card{background:#fff;border-radius:18px;overflow:hidden}
.menu-card-header{background:#e8944a;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.menu-card-header .mdate{color:#fff;font-size:14px;font-weight:700}
.night-pill{background:rgba(255,255,255,0.25);color:#fff;font-size:11px;border-radius:10px;padding:2px 9px;font-weight:600}
.regen-pill{background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:10px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.regen-pill:active{background:rgba(255,255,255,0.35)}
.menu-card-body{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dish-row{display:flex;flex-direction:column;gap:4px}
.dish-label{font-size:11px;color:#8e8e93;font-weight:600;letter-spacing:0.3px}
.dish-name{font-size:14px;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:10px;display:inline-block;transition:opacity 0.1s}
.dish-name:active{opacity:0.65}
.dish-name.main{background:#fff3e8;color:#854F0B}
.dish-name.side{background:#EAF3DE;color:#27500A}
.dish-name.soup{background:#E1F5EE;color:#085041}
.dish-name.kids{background:#FBEAF0;color:#72243E}
.shop-body{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.shop-group{background:#fff;border-radius:18px;overflow:hidden}
.shop-group-title{padding:12px 16px 6px;font-size:12px;font-weight:700;color:#8e8e93;letter-spacing:0.8px}
.shop-items-grid{display:flex;flex-wrap:wrap;gap:7px;padding:0 14px 14px}
.shop-chip{font-size:14px;padding:7px 16px;background:#f2f2f7;border-radius:22px;cursor:pointer;color:#1c1c1e;border:none;font-family:inherit;font-weight:500;transition:transform 0.1s}
.shop-chip:active{transform:scale(0.93)}
.shop-chip.checked{text-decoration:line-through;opacity:0.35}
.copy-row{padding:0 16px 16px}
.copy-btn-sp{width:100%;padding:15px;background:#fff;border:none;border-radius:14px;font-size:15px;color:#555;cursor:pointer;font-family:inherit;font-weight:500}
.copy-btn-sp:active{background:#f2f2f7}
.cp-body{padding:16px}
.search-bar{display:flex;gap:8px;margin-bottom:20px}
.search-bar input{flex:1;padding:13px 16px;font-size:15px;border:none;border-radius:14px;background:#fff;color:#1c1c1e;font-family:inherit;outline:none}
.search-bar button{padding:13px 18px;background:#e8944a;color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.search-bar button:active{background:#c0703a}
.cp-section-title{font-size:13px;font-weight:700;color:#8e8e93;margin-bottom:10px;letter-spacing:0.5px}
.cp-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.cp-tag{font-size:14px;padding:8px 16px;background:#fff;border-radius:22px;cursor:pointer;color:#1c1c1e;border:none;font-family:inherit;font-weight:500}
.cp-tag:active{background:#f2f2f7;transform:scale(0.95)}
.cp-hint-box{background:#fff;border-radius:18px;padding:28px;text-align:center;color:#8e8e93;font-size:14px;line-height:1.9}
.cp-hint-icon{font-size:44px;display:block;margin-bottom:12px}
.rep-body{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.rep-group{background:#fff;border-radius:18px;overflow:hidden}
.rep-group-title{padding:14px 16px 6px;font-size:13px;font-weight:700;color:#8e8e93;letter-spacing:0.5px}
.rep-items{padding:0 14px 8px;display:flex;flex-wrap:wrap;gap:7px}
.rep-chip{font-size:13px;padding:6px 12px;background:#f2f2f7;border-radius:20px;color:#1c1c1e;display:flex;align-items:center;gap:5px}
.rep-chip .del{background:none;border:none;color:#aaa;cursor:pointer;font-size:15px;padding:0;line-height:1;font-family:inherit}
.rep-chip .del:active{color:#e24b4a}
.rep-add-row{display:flex;gap:8px;padding:8px 14px 14px;border-top:0.5px solid #f2f2f7}
.rep-add-row input{flex:1;padding:10px 14px;font-size:14px;border:none;background:#f2f2f7;border-radius:12px;color:#1c1c1e;font-family:inherit;outline:none}
.rep-add-row button{padding:10px 16px;background:#e8944a;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.rep-add-row button:active{background:#c0703a}
</style>
</head>
<body>
<div class="app-wrap">
  <div class="status-bar"></div>
  <div class="page active" id="page-cal">
    <div class="page-header">
      <h1>📅 夜勤カレンダー</h1>
      <p>日付をタップして🌛夜勤日を登録</p>
    </div>
    <div class="screen">
      <div class="cal-grid" id="calGrid"></div>
      <div class="hint-box">🌛 夜勤の日はタップで登録できます<br>📍 夜勤日の献立はどんぶりから自動で選ばれます</div>
      <button class="big-btn" onclick="generateMenu()">✨ 今週の献立を自動生成</button>
    </div>
  </div>
  <div class="page" id="page-menu">
    <div class="page-header">
      <h1>🍽️ 今週の献立</h1>
      <p>料理名をタップ → クックパッドで検索</p>
    </div>
    <div class="screen">
      <div class="menu-scroll" id="menuScroll"></div>
      <button class="big-btn" onclick="generateMenu()">🔄 再生成する</button>
    </div>
  </div>
  <div class="page" id="page-shop">
    <div class="page-header">
      <h1>🛒 買い物リスト</h1>
      <p>タップでチェック済みにできます</p>
    </div>
    <div class="screen">
      <div class="shop-body" id="shopBody"></div>
      <div class="copy-row">
        <button class="copy-btn-sp" onclick="copyShopList()">📋 テキストでコピー</button>
      </div>
    </div>
  </div>
  <div class="page" id="page-cp">
    <div class="page-header">
      <h1>🍳 クックパッド</h1>
      <p>レシピをすぐ検索できます</p>
    </div>
    <div class="screen">
      <div class="cp-body">
        <div class="search-bar">
          <input type="text" id="cpInput" placeholder="料理名を入力..." onkeydown="if(event.key==='Enter')openCookpad()">
          <button onclick="openCookpad()">検索</button>
        </div>
        <div class="cp-section-title">今週の献立から検索</div>
        <div class="cp-tags" id="cpTags">
          <span style="font-size:13px;color:#8e8e93">献立を生成すると表示されます</span>
        </div>
        <div class="cp-hint-box">
          <span class="cp-hint-icon">🍳</span>
          料理名をタップすると<br>クックパッドのレシピが開きます
        </div>
      </div>
    </div>
  </div>
  <div class="page" id="page-rep">
    <div class="page-header">
      <h1>📝 レパートリー</h1>
      <p>料理を追加・管理できます</p>
    </div>
    <div class="screen">
      <div class="rep-body" id="repBody"></div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-item active" onclick="showPage('cal',this)">
      <span class="nav-icon">📅</span>
      <span class="nav-label">カレンダー</span>
    </button>
    <button class="nav-item" onclick="showPage('menu',this)">
      <span class="nav-icon">🍽️</span>
      <span class="nav-label">献立</span>
    </button>
    <button class="nav-item" onclick="showPage('shop',this)">
      <span class="nav-icon">🛒</span>
      <span class="nav-label">買い物</span>
    </button>
    <button class="nav-item" onclick="showPage('cp',this)">
      <span class="nav-icon">🍳</span>
      <span class="nav-label">レシピ</span>
    </button>
    <button class="nav-item" onclick="showPage('rep',this)">
      <span class="nav-icon">📝</span>
      <span class="nav-label">メニュー</span>
    </button>
  </div>
</div>
<script>
const DAYS=['月','火','水','木','金','土','日'];
let repertoire={
  meat:['鶏むね焼き','炒り鶏にんじん','ささみカツ','ハンバーグ','豚しょうが炒め','豚肉巻き','唐揚げ'],
  fish:['鮭のホイル焼き','鯖の味噌煮','鮭のフライ'],
  donburi:['カレー','ハヤシライス','チャーハン','親子丼','牛丼','豚丼','炊き込み','オムライス','タコライス'],
  noodle:['焼きそば','うどん','そば','担々麺','パスタ'],
  kids:['ミートボール','玉子焼き','鶏むね焼き','唐揚げもどき','ポテト','おにぎり'],
  side:['ポテトサラダ','ひじきのお浸しの煮物','トマトサラダ','かぼちゃの煮付け','ブロッコリー','サラダ','白和え'],
  soup:['味噌汁','豚汁','かき卵スープ','コンソメスープ']
};
const catLabels={meat:'肉料理',fish:'魚料理',donburi:'丼・汁麺',noodle:'麺類',kids:'子ども用',side:'副菜',soup:'お汁'};
const ingredients={
  '鶏むね焼き':['鶏もも肉','醤油','みりん','にんにく','片栗粉','生姜'],
  '炒り鶏にんじん':['鶏もも肉','醤油','砂糖'],
  'ささみカツ':['鶏もも肉','玉ねぎ','パン粉','味噌','砂糖'],
  'ハンバーグ':['合いびき肉','玉ねぎ','パン粉','みりん','パン粉'],
  '豚しょうが炒め':['鶏もも肉','ケチャップ','生姜','豚しゃぶ肉','玉ねぎ','砂糖','醤油','砂糖'],
  '豚肉巻き':['ロース','片栗粉','醤油','みりん'],
  '唐揚げ':['鶏もも肉','醤油','砂糖'],
  '鮭のホイル焼き':['鮭','玉ねぎ','みりん','片栗粉','生姜'],
  '鯖の味噌煮':['鯖','味噌','砂糖','醤油'],
  '鮭のフライ':['鮭','玉ねぎ','パン粉','片栗粉'],
  'カレー':['鶏もも肉','玉ねぎ','にんじん','じゃがいも','カレールー'],
  'ハヤシライス':['合いびき肉','玉ねぎ','デミグラス','ハヤシルー','トマト缶'],
  'チャーハン':['ご飯','玉ねぎ','醤油','砂糖'],
  '親子丼':['鶏もも肉','玉ねぎ','醤油','みりん','片栗粉','卵'],
  '牛丼':['牛薄切り肉','玉ねぎ','醤油','砂糖'],
  '豚丼':['ご飯','玉ねぎ','醤油','砂糖'],
  '炊き込み':['鶏肉','ごぼう','にんじん','醤油','みりん','白だし'],
  'オムライス':['ご飯','玉ねぎ','醤油','砂糖'],
  'タコライス':['合いびき肉','玉ねぎ','醤油','砂糖'],
  '焼きそば':['豚薄切り肉','玉ねぎ','にんじん','もやし','ソース'],
  'うどん':['うどん','白だし','にんじん','かまぼこ','みりん'],
  'そば':['そば','だし','みりん','ねぎ'],
  '担々麺':['ご飯','玉ねぎ','醤油','砂糖'],
  'パスタ':['パスタ','玉ねぎ','ツナ缶','醤油'],
  'ミートボール':['合いびき肉','玉ねぎ','パン粉','砂糖'],
  '玉子焼き':['玉子焼き'],
  '鮭のフライ(kid)':['鮭','玉ねぎ'],
  '唐揚げもどき':['拝啓','生姜','醤油'],
  'ポテト':['じゃがいも','おか','草'],
  'おにぎり':['ご飯','のり','塩'],
  'ポテトサラダ':['じゃがいも','きゅうり','玉ねぎ','にんじん','マヨネーズ'],
  'ひじきのお浸しの煮物':['ひじき','すりごまありがとう','醤油','砂糖'],
  'トマトサラダ':['トマト','きゅうり','玉ねぎ'],
  'かぼちゃの煮付け':['かぼちゃ','おか','草'],
  'ブロッコリー':['ブロッコリー'],
  'サラダ':['レタス','きゅうり','玉ねぎ','にんじん','ドレッシング','マヨネーズ'],
  '白和え':['白和え'],
  '味噌汁':['味噌','だし'],
  '豚汁':['豚薄切り肉','大根','にんじん','こんにゃく','味噌'],
  'かき卵スープ':['卵','鶏ガラスープ','片栗粉','ねぎ','生姜','コンソメスープ'],
  'コンソメスープ':['玉ねぎ','にんじん','じゃがいも','コンソメ']
};
const shopCategories={
  '肉類':['鶏もも肉','豚薄切り肉','豚しゃぶ肉','牛薄切り肉','合いびき肉','ロース','鮭'],
  '魚類':['片栗粉','玉ねぎ','鯖'],
  '野菜':['玉ねぎ','じゃがいも','にんじん','きゅうり','ごぼう','もやし','ひじき','かぼちゃ','レタス','ねぎ','きゅうり','トマト','かまぼこ','大根','ブロッコリー','玉子焼き'],
  '豆腐・卵':['卵','玉ねぎ','白だし'],
  '乾物・缶詰':['パン粉','生姜','ツナ缶','デミグラス','ハヤシルー','カレールー','鶏ガラスープ','コンソメ'],
  '調味料':['醤油','みりん','砂糖','味噌','マヨネーズ','ドレッシング','ソース','白だし','コンソメスープ','ケチャップ'],
  'その他':['にんにく','おか','草','のり','塩','パスタ','そば','うどん','ごはん','ご飯','白だし','のり','生姜','砂糖']
};
function saveData(){
  try{
    localStorage.setItem('kondate_nights',JSON.stringify([...nightDays]));
    localStorage.setItem('kondate_rep',JSON.stringify(repertoire));
    localStorage.setItem('kondate_checked',JSON.stringify([...shopChecked]));
  }catch(e){}
}
function loadData(){
  try{
    const n=localStorage.getItem('kondate_nights');
    if(n) nightDays=new Set(JSON.parse(n));
    const r=localStorage.getItem('kondate_rep');
    if(r) repertoire=JSON.parse(r);
    const c=localStorage.getItem('kondate_checked');
    if(c) shopChecked=new Set(JSON.parse(c));
  }catch(e){}
}
let nightDays=new Set(),currentMenu=[],shopChecked=new Set();
loadData();
function getWeekDates(){
  const today=new Date(),dow=today.getDay();
  const mon=new Date(today);
  mon.setDate(today.getDate()-dow+(dow===0?-6:1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function renderCalendar(){
  const grid=document.getElementById('calGrid'),dates=getWeekDates(),today=new Date();
  grid.innerHTML='';
  dates.forEach(d=>{
    const key=d.toDateString(),isToday=d.toDateString()===today.toDateString(),isNight=nightDays.has(key),dow=d.getDay();
    const cell=document.createElement('div');
    cell.className='cal-cell'+(dow===0?' sun':dow===6?' sat':'')+(isNight?' night':'')+(isToday?' today':'');
    cell.innerHTML=`<span class="cday">${DAYS[dow===0?6:dow-1]}</span><span class="cnum">${d.getDate()}</span><span class="cicon">${isNight?'🌛':isToday?'📍':''}</span>`;
    cell.onclick=()=>{
      if(nightDays.has(key))nightDays.delete(key);else nightDays.add(key);
      saveData();renderCalendar();
    };
    grid.appendChild(cell);
  });
}
function pick(arr,exclude=[]){const a=arr.filter(x=>!exclude.includes(x));return(a.length?a:arr)[Math.floor(Math.random()*(a.length||arr.length))];}
function generateMenu(){
  const dates=getWeekDates(),uM=[],uS=[],uSo=[],uK=[];
  currentMenu=dates.map(d=>{
    const key=d.toDateString(),isNight=nightDays.has(key);
    const pool=isNight?repertoire.donburi:[...repertoire.meat,...repertoire.fish,...repertoire.donburi,...repertoire.noodle];
    const main=pick(pool,uM);uM.push(main);if(uM.length>5)uM.shift();
    const side=pick(repertoire.side,uS);uS.push(side);if(uS.length>3)uS.shift();
    const soup=pick(repertoire.soup,uSo);uSo.push(soup);if(uSo.length>2)uSo.shift();
    const kid=pick(repertoire.kids,uK);uK.push(kid);if(uK.length>3)uK.shift();
    return{date:d,isNight,main,side,soup,kid};
  });
  renderMenu();renderShopList();updateCpTags();
  showPage('menu',document.querySelectorAll('.nav-item')[1]);
}
function regenDay(idx){
  const d=currentMenu[idx];
  const uM=currentMenu.filter((_,i)=>i!==idx).map(m=>m.main);
  const pool=d.isNight?repertoire.donburi:[...repertoire.meat,...repertoire.fish,...repertoire.donburi,...repertoire.noodle];
  d.main=pick(pool,uM);
  d.side=pick(repertoire.side,currentMenu.filter((_,i)=>i!==idx).map(m=>m.side));
  d.soup=pick(repertoire.soup,currentMenu.filter((_,i)=>i!==idx).map(m=>m.soup));
  d.kid=pick(repertoire.kids,currentMenu.filter((_,i)=>i!==idx).map(m=>m.kid));
  renderMenu();renderShopList();updateCpTags();
}
function renderMenu(){
  const scroll=document.getElementById('menuScroll'),today=new Date();
  scroll.innerHTML='';
  currentMenu.forEach((m,i)=>{
    const dow=m.date.getDay(),isToday=m.date.toDateString()===today.toDateString();
    const dayStr=`${m.date.getMonth()+1}/${m.date.getDate()}（${DAYS[dow===0?6:dow-1]}）${isToday?' 📍今日':''}`;
    const card=document.createElement('div');card.className='menu-card';
    card.innerHTML=`
      <div class="menu-card-header">
        <span class="mdate">${dayStr}</span>
        <div style="display:flex;gap:6px;align-items:center">
          ${m.isNight?'<span class="night-pill">🌛夜勤</span>':''}
          <button class="regen-pill" onclick="regenDay(${i})">↺ 変更</button>
        </div>
      </div>
      <div class="menu-card-body">
        <div class="dish-row"><span class="dish-label">主菜</span><span class="dish-name main" onclick="searchCookpad('${m.main}')">${m.main}</span></div>
        <div class="dish-row"><span class="dish-label">副菜</span><span class="dish-name side" onclick="searchCookpad('${m.side}')">${m.side}</span></div>
        <div class="dish-row"><span class="dish-label">お汁</span><span class="dish-name soup" onclick="searchCookpad('${m.soup}')">${m.soup}</span></div>
        <div class="dish-row"><span class="dish-label">子ども用</span><span class="dish-name kids" onclick="searchCookpad('${m.kid}')">${m.kid}</span></div>
      </div>`;
    scroll.appendChild(card);
  });
}
function renderShopList(){
  const allDishes=currentMenu.flatMap(m=>[m.main,m.side,m.soup,m.kid]);
  const allIng=new Set();allDishes.forEach(d=>(ingredients[d]||[]).forEach(i=>allIng.add(i)));
  const byCat={};Object.keys(shopCategories).forEach(c=>{byCat[c]=[];});
  allIng.forEach(ing=>{
    let placed=false;
    for(const[cat,items] of Object.entries(shopCategories)){if(items.includes(ing)){byCat[cat].push(ing);placed=true;break;}}
    if(!placed){if(!byCat['その他'])byCat['その他']=[];byCat['その他'].push(ing);}
  });
  const body=document.getElementById('shopBody');body.innerHTML='';
  Object.entries(byCat).forEach(([cat,items])=>{
    if(!items.length)return;
    const g=document.createElement('div');g.className='shop-group';
    g.innerHTML=`<div class="shop-group-title">${cat}</div><div class="shop-items-grid">${items.map(it=>`<button class="shop-chip${shopChecked.has(it)?' checked':''}" onclick="toggleShop('${it}',this)">${it}</button>`).join('')}</div>`;
    body.appendChild(g);
  });
}
function toggleShop(item,el){
  if(shopChecked.has(item))shopChecked.delete(item);else shopChecked.add(item);
  el.classList.toggle('checked');
  saveData();
}
function copyShopList(){
  const allDishes=currentMenu.flatMap(m=>[m.main,m.side,m.soup,m.kid]);
  const allIng=new Set();allDishes.forEach(d=>(ingredients[d]||[]).forEach(i=>allIng.add(i)));
  const text='【今週の買い物リスト】\n'+[...allIng].filter(i=>!shopChecked.has(i)).join('\n');
  if(navigator.share){navigator.share({text});}
  else{navigator.clipboard.writeText(text).then(()=>alert('コピーしました！'));}
}
function searchCookpad(dish){window.open('https://cookpad.com/search/'+encodeURIComponent(dish),'_blank');}
function openCookpad(){const q=document.getElementById('cpInput').value.trim();if(q)searchCookpad(q);}
function updateCpTags(){
  const tags=document.getElementById('cpTags');
  const dishes=[...new Set(currentMenu.flatMap(m=>[m.main,m.side,m.soup,m.kid]))];
  tags.innerHTML=dishes.map(d=>`<button class="cp-tag" onclick="searchCookpad('${d.replace(/'/g,"\\'")}'">${d}</button>`).join('');
}
function renderRepertoire(){
  const body=document.getElementById('repBody');body.innerHTML='';
  Object.entries(catLabels).forEach(([key,label])=>{
    const g=document.createElement('div');g.className='rep-group';
    g.innerHTML=`
      <div class="rep-group-title">${label}</div>
      <div class="rep-items" id="ri-${key}">${repertoire[key].map(item=>`<span class="rep-chip">${item}<button class="del" onclick="delRep('${key}','${item.replace(/'/g,"\\'")}')">×</button></span>`).join('')}</div>
      <div class="rep-add-row">
        <input type="text" placeholder="新しい料理を追加..." id="ai-${key}" onkeydown="if(event.key==='Enter')addRep('${key}')">
        <button onclick="addRep('${key}')">追加</button>
      </div>`;
    body.appendChild(g);
  });
}
function addRep(key){
  const inp=document.getElementById('ai-'+key),val=inp.value.trim();
  if(!val||repertoire[key].includes(val))return;
  repertoire[key].push(val);inp.value='';
  saveData();renderRepertoire();
}
function delRep(key,item){
  repertoire[key]=repertoire[key].filter(x=>x!==item);
  saveData();renderRepertoire();
}
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}
renderCalendar();
generateMenu();
renderRepertoire();
</script>
</body>
</html>
